<h2>Listes des praticiens</h2>

<ul>
  @for(practitioner of practitioners; track practitioner.id){
    <li [routerLink]="['/practitioners',practitioner.id]">
      <div>{{practitioner.lastName}}</div>
      <div>{{practitioner.firstName}}</div>
      <div>{{practitioner.speciality}}</div>
    </li>
  }
</ul>
<button [routerLink]="'practitioners/create'">Ajouter praticien</button>
