<h2>Détails du patient</h2>

@if(patient) {
  <div>nom : {{patient.lastName}}</div>
  <div>prénom : {{patient.firstName}}</div>
  <div>age : {{patient.age}}</div>
  <div>sport pratiqué : {{patient.sportName}}</div>
  <div>adresse physique : {{patient.address}}</div>
}
<button [routerLink]="['/patients', patient?.id, 'edit']">Edit</button>
<button (click)="onDelete(patient?.id)">Delete</button>
